services:
  postgres:
    image: postgres:16-alpine
    container_name: dark-jutsu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dark_jutsu}
      POSTGRES_USER: ${POSTGRES_USER:-dark_jutsu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dark_jutsu_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dark_jutsu_pgdata:/var/lib/postgresql/data
      - ./db:/db:ro
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dark_jutsu} -d ${POSTGRES_DB:-dark_jutsu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: dark-jutsu-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  dark_jutsu_pgdata:
