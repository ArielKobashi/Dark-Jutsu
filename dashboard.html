<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Estoque</title>
    <style>
        :root{
            color-scheme:dark;
            --bg:#0D0D12;
            --panel:#15151D;
            --panel2:#1A1A25;
            --line:#2A2A35;
            --text:#E6E6E6;
            --muted:#9CA3AF;
            --soft:#cbd5e1;
            --red:#ef4444;
            --green:#22c55e;
            --amber:#f59e0b;
            --blue:#00D9FF;
            --violet:#7A3CFF;
            --violet2:#9A5CFF;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            min-height:100vh;
            background:
                radial-gradient(circle at 22% 16%, rgba(122,60,255,.28), transparent 36%),
                radial-gradient(circle at 88% 12%, rgba(0,217,255,.12), transparent 30%),
                #0D0D12;
            color:var(--text);
            font-family:Segoe UI, Arial, sans-serif;
        }
        header{
            border-bottom:1px solid rgba(122,60,255,.35);
            background:rgba(13,13,18,.86);
            backdrop-filter:blur(16px);
            box-shadow:0 0 20px rgba(122,60,255,.24);
        }
        .topbar{
            width:min(1420px, 100%);
            margin:0 auto;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:18px;
            padding:20px 24px 14px;
        }
        h1{margin:0;font-size:24px;font-weight:800;letter-spacing:0}
        h2{margin:0 0 12px;font-size:18px}
        .sub{color:var(--muted);font-size:12px;margin-top:5px}
        .headerActions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
        main{
            width:min(1420px, 100%);
            margin:0 auto;
            padding:18px 24px 30px;
        }
        .login,.erro,.loading,.empty{
            max-width:440px;
            margin:58px auto;
            padding:20px;
            background:rgba(21,21,29,.94);
            border:1px solid rgba(122,60,255,.42);
            border-radius:8px;
            box-shadow:0 0 24px rgba(122,60,255,.26);
        }
        .loading,.empty{max-width:560px;text-align:center;color:var(--muted)}
        label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px}
        input,button{
            width:100%;
            border:1px solid var(--line);
            background:#1F1F2A;
            color:var(--text);
            padding:10px 11px;
            border-radius:6px;
            font:inherit;
        }
        button{
            cursor:pointer;
            font-weight:800;
            background:linear-gradient(145deg,#7A3CFF,#5A2CBB);
            border-color:#9A5CFF;
        }
        button:disabled{opacity:.62;cursor:wait}
        .primaryBtn,.secondaryBtn{
            width:auto;
            min-height:36px;
            padding:8px 12px;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            border-radius:6px;
            font-size:13px;
            font-weight:800;
            color:var(--text);
        }
        .primaryBtn{background:linear-gradient(145deg,#7A3CFF,#5A2CBB);border:1px solid #9A5CFF}
        .secondaryBtn{background:#1A1A25;border:1px solid #2A2A35}
        .login button{margin-top:14px}
        .loginStatus{min-height:18px;color:#fca5a5;font-size:12px;margin-top:10px}
        .cards{
            display:grid;
            grid-template-columns:repeat(4,minmax(0,1fr));
            gap:10px;
            margin-bottom:14px;
        }
        .card{
            background:rgba(21,21,29,.9);
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            padding:14px;
        }
        .card span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase}
        .card strong{display:block;font-size:26px;margin-top:7px}
        .card.red strong{color:#fecaca}
        .card.green strong{color:#bbf7d0}
        .card.blue strong{color:#bae6fd}
        .toolbar{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-bottom:12px;
        }
        .chip{
            border:1px solid rgba(122,60,255,.28);
            border-radius:999px;
            padding:6px 9px;
            font-size:12px;
            color:var(--soft);
            background:rgba(26,26,37,.78);
        }
        .filters{
            display:grid;
            grid-template-columns:repeat(5, minmax(0, 1fr));
            gap:8px;
            margin-bottom:12px;
            padding:10px;
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            background:rgba(21,21,29,.76);
        }
        .filter{
            min-width:0;
        }
        .filter label{
            margin:0 0 5px;
        }
        select,.filter input{
            width:100%;
            min-height:34px;
            border:1px solid var(--line);
            background:#1F1F2A;
            color:var(--text);
            padding:8px 9px;
            border-radius:6px;
            font:inherit;
            font-size:12px;
        }
        .tableWrap{
            overflow:hidden;
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            background:rgba(21,21,29,.88);
            box-shadow:0 0 22px rgba(122,60,255,.18);
        }
        table{
            width:100%;
            table-layout:auto;
            border-collapse:collapse;
        }
        th,td{
            padding:10px 11px;
            border-bottom:1px solid rgba(148,163,184,.14);
            text-align:left;
            font-size:13px;
            vertical-align:top;
        }
        th{
            position:sticky;
            top:0;
            z-index:1;
            color:#EDE9FE;
            background:#1A1A25;
            font-size:11px;
            text-transform:uppercase;
        }
        tr:hover td{background:rgba(122,60,255,.16)}
        tr:last-child td{border-bottom:0}
        .codigo{font-weight:800;color:#e2e8f0;white-space:nowrap}
        .descricao{width:42%;white-space:nowrap;overflow:hidden;text-overflow:clip}
        .num{text-align:right;white-space:nowrap}
        .vizGrid{
            display:grid;
            grid-template-columns:1.2fr .8fr;
            gap:10px;
            margin-bottom:12px;
        }
        .vizPanel{
            background:rgba(21,21,29,.82);
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            padding:12px;
        }
        .vizPanel h2{font-size:14px;margin:0 0 10px;color:#EDE9FE}
        .vizPanelHeader{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:10px;
            margin-bottom:10px;
        }
        .vizPanelHeader h2{margin:0}
        .vizPanelControls{
            display:flex;
            align-items:center;
            justify-content:flex-end;
            gap:6px;
            flex-wrap:wrap;
        }
        .vizPanelControls select,
        .vizPanelControls button{
            min-height:28px;
            border:1px solid var(--line);
            border-radius:6px;
            background:#1F1F2A;
            color:var(--text);
            font:inherit;
            font-size:11px;
            font-weight:800;
            padding:5px 7px;
            width:auto;
        }
        .vizPanelControls button{cursor:pointer}
        .bars{display:grid;gap:7px}
        .barRow{display:grid;grid-template-columns:auto minmax(120px,1fr) 3fr auto;gap:8px;align-items:center;font-size:12px}
        .barRank{color:var(--muted);font-weight:800;min-width:26px;text-align:right}
        .barLabel{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#dbe3ef}
        .barTrack{height:10px;background:#1F1F2A;border-radius:999px;overflow:hidden;border:1px solid #2A2A35}
        .barFill{height:100%;background:linear-gradient(90deg,#7A3CFF,#00D9FF)}
        .barScale{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;color:var(--muted);font-size:10px;margin-top:2px}
        .barScale span:nth-child(2){text-align:center}
        .barScale span:nth-child(3){text-align:right}
        .sortTh{
            appearance:none;
            border:0;
            background:transparent;
            color:inherit;
            width:100%;
            padding:0;
            font:inherit;
            font-weight:800;
            text-align:inherit;
            text-transform:inherit;
            cursor:pointer;
        }
        .sortTh::after{content:"";margin-left:5px;color:var(--blue)}
        .sortTh.asc::after{content:"▲"}
        .sortTh.desc::after{content:"▼"}
        .pieWrap{display:flex;align-items:center;gap:14px}
        .pie{
            width:118px;
            height:118px;
            border-radius:50%;
            background:conic-gradient(#ef4444 0 var(--abaixo), #22c55e var(--abaixo) var(--acima), #00D9FF var(--acima) 100%);
            border:1px solid rgba(122,60,255,.35);
            box-shadow:0 0 16px rgba(122,60,255,.18);
            flex:0 0 auto;
        }
        .legend{display:grid;gap:6px;font-size:12px;color:var(--soft)}
        .legend span::before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;background:var(--c)}
        .sectionTitle{font-size:15px;margin:16px 0 8px;color:#EDE9FE}
        .contagemProgressPanel{
            margin-bottom:14px;
            padding:14px;
            border:1px solid rgba(34,211,238,.34);
            border-radius:8px;
            background:linear-gradient(135deg, rgba(8,47,73,.88), rgba(21,21,29,.92));
            box-shadow:0 0 22px rgba(34,211,238,.18);
        }
        .contagemProgressTop{
            display:flex;
            align-items:flex-end;
            justify-content:space-between;
            gap:12px;
            margin-bottom:10px;
        }
        .contagemProgressTop span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:800}
        .contagemProgressTop strong{display:block;font-size:28px;color:#CFFAFE}
        .contagemProgressMeta{color:#cbd5e1;font-size:12px;text-align:right}
        .contagemProgressTrack{
            position:relative;
            height:16px;
            overflow:hidden;
            border-radius:999px;
            border:1px solid rgba(103,232,249,.35);
            background:#0F172A;
        }
        .contagemProgressFill{
            position:relative;
            height:100%;
            border-radius:999px;
            background:linear-gradient(90deg,#22C55E,#00D9FF,#7A3CFF);
            box-shadow:0 0 14px rgba(34,211,238,.42);
            overflow:hidden;
            animation:contagemProgressPulse 1.6s ease-in-out infinite;
            transition:width .45s ease;
        }
        .contagemProgressFill::after{
            content:"";
            position:absolute;
            inset:0;
            width:42%;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,.42), transparent);
            transform:translateX(-130%);
            animation:contagemProgressShine 1.25s linear infinite;
        }
        @keyframes contagemProgressPulse{
            0%,100%{filter:brightness(1)}
            50%{filter:brightness(1.22)}
        }
        @keyframes contagemProgressShine{
            to{transform:translateX(260%)}
        }
        .status{
            display:inline-flex;
            border-radius:999px;
            padding:4px 8px;
            font-size:11px;
            font-weight:800;
            white-space:nowrap;
        }
        .abaixo{background:rgba(239,68,68,.16);color:#fecaca}
        .acima{background:rgba(34,197,94,.16);color:#bbf7d0}
        .ok{background:rgba(56,189,248,.14);color:#bae6fd}
        .sem{background:rgba(148,163,184,.14);color:#cbd5e1}
        .pedido{color:#cbd5e1}
        .pedido.semPedido{color:#fca5a5;font-weight:800}
        .origem{color:var(--muted)}
        .avaliadorLayout{
            display:grid;
            grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr);
            gap:12px;
            align-items:start;
        }
        .avaliadorPanel{
            background:rgba(21,21,29,.86);
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            padding:12px;
            box-shadow:0 0 18px rgba(122,60,255,.14);
            min-width:0;
        }
        .avaliadorPanel h2{
            font-size:15px;
            color:#EDE9FE;
            margin:0 0 10px;
        }
        .avaliadorList{
            display:grid;
            gap:10px;
        }
        .avaliadorItem{
            border:1px solid rgba(148,163,184,.18);
            background:rgba(26,26,37,.9);
            border-radius:8px;
            padding:10px;
            min-width:0;
        }
        .avaliadorItemTop{
            display:grid;
            grid-template-columns:minmax(0,1fr) auto;
            gap:10px;
            align-items:start;
            margin-bottom:8px;
        }
        .avaliadorCodigo{
            font-weight:900;
            color:#e2e8f0;
            font-size:14px;
        }
        .avaliadorDescricao{
            color:#cbd5e1;
            font-size:12px;
            margin-top:3px;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
        }
        .avaliadorTags{
            display:flex;
            flex-wrap:wrap;
            gap:6px;
            margin:7px 0;
        }
        .avaliadorTag{
            border:1px solid rgba(148,163,184,.22);
            border-radius:999px;
            padding:4px 7px;
            font-size:11px;
            color:#dbeafe;
            background:rgba(15,23,42,.62);
            white-space:nowrap;
        }
        .avaliadorStats{
            display:grid;
            grid-template-columns:repeat(4,minmax(0,1fr));
            gap:7px;
            margin:8px 0 6px;
        }
        .avaliadorStat{
            border:1px solid rgba(148,163,184,.16);
            border-radius:7px;
            padding:8px;
            background:rgba(15,23,42,.48);
            min-width:0;
        }
        .avaliadorStat span{
            display:block;
            color:var(--muted);
            font-size:10px;
            text-transform:uppercase;
            font-weight:800;
        }
        .avaliadorStat strong{
            display:block;
            font-size:15px;
            margin-top:4px;
            color:#f8fafc;
        }
        .avaliadorActions{
            display:flex;
            flex-wrap:wrap;
            gap:7px;
            margin-top:8px;
        }
        .avaliadorActions button,
        .kanbanCard button{
            width:auto;
            min-height:30px;
            padding:6px 9px;
            font-size:11px;
            border-radius:6px;
        }
        .avaliadorActions .okBtn{background:#14532d;border-color:#22c55e}
        .avaliadorActions .warnBtn{background:#713f12;border-color:#f59e0b}
        .avaliadorActions .stopBtn{background:#7f1d1d;border-color:#ef4444}
        .historicoMini{
            overflow:auto;
            border:1px solid rgba(148,163,184,.13);
            border-radius:7px;
            margin-top:6px;
            max-height:260px;
        }
        .historicoMini.expandido{max-height:360px}
        .avaliadorItem{
            max-height:620px;
            overflow:auto;
        }
        .avaliadorDetails{
            border:1px solid rgba(148,163,184,.16);
            border-radius:8px;
            background:rgba(15,23,42,.36);
            margin-top:7px;
            overflow:hidden;
        }
        .avaliadorDetails summary{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            padding:8px 9px;
            color:#EDE9FE;
            font-size:12px;
            font-weight:900;
            cursor:pointer;
            list-style:none;
            user-select:none;
        }
        .avaliadorDetails summary::-webkit-details-marker{display:none}
        .avaliadorDetails summary::after{
            content:"+";
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:20px;
            height:20px;
            border-radius:999px;
            background:#1F1F2A;
            color:#BAE6FD;
            border:1px solid rgba(148,163,184,.2);
            flex:0 0 auto;
        }
        .avaliadorDetails[open] summary::after{content:"-"}
        .cooperatMore .lessLabel{display:none}
        .cooperatMore[open] .moreLabel{display:none}
        .cooperatMore[open] .lessLabel{display:inline}
        .avaliadorDetailsBody{
            padding:0 9px 9px;
        }
        .avaliadorSummaryMeta{
            color:var(--muted);
            font-size:11px;
            font-weight:800;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .avaliadorDecisionPanel{
            display:grid;
            gap:8px;
            color:#cbd5e1;
            font-size:12px;
        }
        .historicoBlocoTitulo{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
            margin:10px 0 6px;
            color:#EDE9FE;
            font-size:11px;
            font-weight:900;
            text-transform:uppercase;
        }
        .historicoAviso{
            border:1px solid rgba(245,158,11,.32);
            background:rgba(113,63,18,.22);
            color:#FDE68A;
            border-radius:7px;
            padding:7px 8px;
            font-size:11px;
            line-height:1.35;
            margin-top:8px;
        }
        .historicoMini table{min-width:620px}
        .historicoMini th,
        .historicoMini td{
            padding:7px 8px;
            font-size:11px;
        }
        .kanbanGrid{
            display:grid;
            grid-template-columns:repeat(5,minmax(210px,1fr));
            gap:10px;
            overflow:auto;
            padding-bottom:4px;
            max-height:560px;
        }
        .kanbanGrid.expanded{max-height:none}
        .kanbanCol{
            border:1px solid rgba(148,163,184,.18);
            border-top:3px solid var(--col);
            border-radius:8px;
            background:rgba(15,23,42,.44);
            min-width:210px;
            padding:9px;
        }
        .kanbanCol h3{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
            margin:0 0 8px;
            font-size:12px;
            color:#f8fafc;
        }
        .kanbanCol h3 span{
            color:var(--muted);
            font-size:11px;
        }
        .kanbanCards{
            display:grid;
            gap:7px;
            align-content:start;
        }
        .kanbanCard{
            border:1px solid rgba(148,163,184,.16);
            border-radius:8px;
            background:rgba(26,26,37,.92);
            padding:8px;
            min-width:0;
            overflow:hidden;
        }
        .kanbanCardTitle{
            font-weight:900;
            color:#e2e8f0;
            font-size:12px;
        }
        .kanbanCardDesc{
            color:#cbd5e1;
            font-size:11px;
            margin:4px 0 7px;
            display:-webkit-box;
            -webkit-line-clamp:1;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        .kanbanCard .avaliadorTags{
            gap:5px;
            overflow:hidden;
        }
        .kanbanCard .avaliadorTag{
            max-width:100%;
            min-width:0;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
        }
        .kanbanCard .avaliadorTag.pedidoTag{
            display:block;
            width:100%;
        }
        .kanbanCard .avaliadorDetails{
            margin-top:7px;
        }
        .kanbanCard .avaliadorDetails summary{
            min-height:34px;
            padding:8px;
        }
        .kanbanMeta{
            display:grid;
            gap:3px;
            color:var(--muted);
            font-size:11px;
            margin-bottom:7px;
        }
        .kanbanFiltroBar{
            display:flex;
            align-items:flex-end;
            justify-content:space-between;
            flex-wrap:wrap;
            gap:10px;
            margin:14px 0 8px;
            padding:10px;
            border:1px solid rgba(122,60,255,.28);
            border-radius:8px;
            background:rgba(21,21,29,.76);
        }
        .kanbanFiltroBar .filter{width:min(260px,100%)}
        .kanbanFiltroBar .filter:first-of-type{width:min(330px,100%)}
        .kanbanMore{
            width:100%;
            margin:10px 0 14px;
            border:1px solid rgba(122,60,255,.35);
            border-radius:8px;
            background:rgba(26,26,37,.88);
            color:#EDE9FE;
            text-decoration:none;
            min-height:38px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:900;
            font-size:13px;
        }
        .kanbanEmpty{
            border:1px dashed rgba(148,163,184,.22);
            border-radius:8px;
            padding:14px 10px;
            color:var(--muted);
            font-size:12px;
            text-align:center;
            background:rgba(15,23,42,.35);
        }
        .avaliadorDecision{
            display:inline-flex;
            border-radius:999px;
            padding:5px 8px;
            font-size:11px;
            font-weight:900;
            background:rgba(34,197,94,.16);
            color:#bbf7d0;
            white-space:nowrap;
        }
        @media (max-width:1100px){
            .avaliadorLayout{grid-template-columns:1fr}
        }
        @media (max-width:800px){
            .topbar{display:block;padding:17px 14px 12px}
            .headerActions{justify-content:flex-start;margin-top:12px}
            main{padding:14px}
            .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
            .filters{grid-template-columns:repeat(2,minmax(0,1fr))}
            .vizGrid{grid-template-columns:1fr}
            .avaliadorStats{grid-template-columns:repeat(2,minmax(0,1fr))}
            .card strong{font-size:22px}
            th,td{font-size:12px;padding:8px}
        }
    </style>
</head>
<body>
    <header>
        <div class="topbar">
            <div>
                <h1 id="titulo">Dashboard de Estoque</h1>
                <div class="sub" id="subtitulo">Carregando dados...</div>
            </div>
            <div class="headerActions">
                <span class="sub" id="ultimaAtualizacao"></span>
                <a class="secondaryBtn" href="dashboard.html?ambiente=avaliador&armazem=04&status=abaixo&limite=50">Avaliador</a>
                <a class="secondaryBtn" href="index.html">Abrir Dark</a>
                <button class="primaryBtn" id="btnAtualizar" type="button">Atualizar</button>
            </div>
        </div>
    </header>
    <main id="app"></main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

                if(value === null || value === undefined || value === ""){
                    next.delete(key);
                }else{
                    next.set(key, String(value));
                }
            });
            return `${location.pathname}?${next.toString()}`;

        const regexArmazemBusca = /(?:do|da|dos|das|de)?\s*(?:armaz[eé]m|almox|deposito|dep[oó]sito)\s*(?:desejado|n[ºo.]*)?\s*[:=-]?\s*([a-z0-9]+)/i;

        async function salvarDashboardPanelConfig(id){
            try{
                const conf = configPainelDashboard(id);
                await set(ref(db, `dashboardConfig/paineis/${id}`), {
                    limite: conf.limite,
                    codigosOcultos: (conf.codigosOcultos || []).join(",")
                });
                return true;
            }catch(e){
                alert("Nao foi possivel salvar a configuracao compartilhada do dashboard no Firebase.");
                console.warn("Falha ao salvar painel do dashboard:", e);
                return false;
            }
        }
        function painelDashboardId(titulo){
            return String(titulo || "painel")
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "_")
                .replace(/^_+|_+$/g, "") || "painel";
        }
        function configPainelDashboard(id){
            const atual = dashboardPanelConfig[id] || {};
            const limite = Math.max(1, Math.min(100, Number(atual.limite || 8) || 8));
            const codigosRaw = Array.isArray(atual.codigosOcultos)
                ? atual.codigosOcultos
                : typeof atual.codigosOcultos === "string"
                    ? atual.codigosOcultos.split(/[,\s]+/)
                    : atual.codigosOcultos && typeof atual.codigosOcultos === "object"
                        ? Object.values(atual.codigosOcultos)
                        : [];
            const codigosOcultos = codigosRaw.map(normalizarCodigo).filter(Boolean);
            dashboardPanelConfig[id] = { limite, codigosOcultos:[...new Set(codigosOcultos)] };
            return dashboardPanelConfig[id];
        }
        function codigoLinhaDashboard(linha){
            return normalizarCodigo(linha?.codigo || linha?.item?.protheus || linha?.item?.cooperat || linha?.item?.protheusKey || "");
        }
        function fmt(valor){
            const n = Number(valor);
            if(!Number.isFinite(n)) return "-";
            return new Intl.NumberFormat("pt-BR", { maximumFractionDigits:2 }).format(n);
        }
        function esc(valor){
            return String(valor ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        function num(valor){
            if(valor === null || valor === undefined || valor === "") return null;
            const n = Number(String(valor).replace(/\./g,"").replace(",","."));
            return Number.isFinite(n) ? n : null;
        }
        function limite(valor){
            const n = num(valor);
            return n === null || n === 0 ? null : n;
        }
        function normalizarLimiteCooperat(valor){
            const n = limite(valor);
            if(n === null) return null;
            return n >= 1000 && n % 1000 === 0 ? n / 1000 : n;
        }
        function normalizarCodigo(valor){
            return String(valor ?? "").trim().toLowerCase();
        }
        function dataPedidoMata111(row){
            return parseDataPlanilha(row?.[2]); // Coluna C da mata111.xlsx.
        }
        function valorOrdenacao(valor){
            if(valor === null || valor === undefined) return "";
            return String(valor).toLowerCase();
        }
        function compararValores(a, b, direcao = "asc"){
            const dir = direcao === "desc" ? -1 : 1;
            const na = typeof a === "number" ? a : num(a);
            const nb = typeof b === "number" ? b : num(b);
            if(na !== null && nb !== null) return (na - nb) * dir;
            return valorOrdenacao(a).localeCompare(valorOrdenacao(b), "pt-BR", { numeric:true, sensitivity:"base" }) * dir;
        }
        function thOrdenavel(rotulo, grupo, campo, classe = ""){
            const ativo = grupo === "estoque"
                ? cfg.ordenar === campo
                : grupo === "pedido"
                    ? cfg.pedidoOrdenar === campo
                    : cfg.movimentoOrdenar === campo;
            const direcao = grupo === "estoque" ? cfg.direcao : grupo === "pedido" ? cfg.pedidoDirecao : cfg.movimentoDirecao;
            return `<th class="${esc(classe)}"><button class="sortTh ${ativo ? esc(direcao) : ""}" type="button" data-sort-group="${esc(grupo)}" data-sort="${esc(campo)}">${esc(rotulo)}</button></th>`;
        }
        function parseDataPlanilha(valor){
            if(valor === null || valor === undefined || valor === "") return null;
            if(typeof valor === "number"){
                const parsed = XLSX?.SSF?.parse_date_code ? XLSX.SSF.parse_date_code(valor) : null;
                if(parsed) return new Date(parsed.y, parsed.m - 1, parsed.d).getTime();
            }
            const texto = String(valor).trim();
            const partes = texto.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if(partes){
                const ano = Number(partes[3].length === 2 ? "20" + partes[3] : partes[3]);
                return new Date(ano, Number(partes[2]) - 1, Number(partes[1])).getTime();
            }
            const data = new Date(texto);
            return Number.isNaN(data.getTime()) ? null : data.getTime();
        }
        function ajusteKey(itemOrKey){
            const valor = typeof itemOrKey === "string" ? itemOrKey : key(itemOrKey);
            try{
                return btoa(unescape(encodeURIComponent(valor || ""))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
            }catch{
                return String(valor || "").replace(/[^A-Za-z0-9_-]/g, "_");
            }
        }
        function decodeAjusteKey(valor){
            try{
                const texto = String(valor || "").replace(/-/g, "+").replace(/_/g, "/");
                const padded = texto + "=".repeat((4 - texto.length % 4) % 4);
                return decodeURIComponent(escape(atob(padded))).trim().toLowerCase();
            }catch{
                return "";
            }
        }
        function key(item){
            return String(item?.protheusKey || item?.protheus || item?.cooperat || "").trim().toLowerCase();
        }
        function reposicao(item){
            const pronta = num(item?.reposicao);
            if(pronta !== null) return pronta;
            const min = num(item?.minimo);
            const max = num(item?.maximo);
            return min !== null && max !== null && max > min ? max - min : null;
        }
        function statusEstoque(item){
            const saldo = num(item?.saldo);
            const min = num(item?.minimo);
            const max = num(item?.maximo);
            if(saldo !== null && min !== null && saldo < min) return "abaixo";
            if(saldo !== null && max !== null && saldo > max) return "acima";
            if(min !== null || max !== null) return "ok";
            return "sem";
        }
        function statusRotulo(status){
            return { abaixo:"Abaixo", acima:"Acima", ok:"Ok", sem:"Sem faixa" }[status] || status;
        }
        function pedidoAtivo(pedido){
            if(!pedido) return false;
            const status = String(pedido.status || "");
            if(!status || status === "sem") return false;
            return !!(pedido.pedido || pedido.solicitacao || pedido.entradaEndereco || pedido.recebidoSemEntrada > 0 || status.startsWith("aguardando"));
        }
        function processoPedidoAberto(pedido){
            if(!pedidoAtivo(pedido)) return false;
            const status = String(pedido?.status || "");
            if(["finalizado","encerrado","entregue","sem"].includes(status)) return false;
            if(status.startsWith("aguardando")) return true;
            return !!(pedido?.solicitacao || pedido?.pedido || pedido?.entradaEndereco || Number(pedido?.recebidoSemEntrada || 0) > 0);
        }
        function pedidoItem(item, pedidos){
            const codigo = key(item);
            const b64 = btoa(unescape(encodeURIComponent(codigo))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
            return pedidos?.[b64] || pedidos?.[codigo] || null;
        }
        function rotuloPedido(pedido){
            if(!pedidoAtivo(pedido)) return "Sem solicitacao";
            const status = String(pedido?.status || "");
            const etapas = {
                aguardando_liberacao: "MATA110: aguardando liberacao da solicitacao",
                aguardando_pedido: "MATA110 liberada: aguardando pedido MATA111",
                aguardando_recebimento: "MATA111: aguardando recebimento da compra",
                aguardando_enderecamento: "MATA112: aguardando enderecamento",
                aguardando_contagem: "Nota recebida: aguardando contagem/conferencia"
            };
            return etapas[status] || pedido?.titulo || "Com solicitacao";
        }
        function primeiroTexto(...valores){
            for(const valor of valores){
                const texto = String(valor ?? "").trim();
                if(texto) return texto;
            }
            return "";
        }
        function quantidadeSolicitadaPedido(pedido){
            return num(pedido?.solicitacao?.quantidadeSolicitada)
                ?? num(pedido?.solicitacao?.quantidadeEmPedido)
                ?? num(pedido?.pedido?.quantidadePedida)
                ?? num(pedido?.ultimoPedido?.quantidadePedida)
                ?? null;
        }
        function quantidadePedidoCompra(pedido){
            return num(pedido?.pedido?.quantidadePedida)
                ?? num(pedido?.ultimoPedido?.quantidadePedida)
                ?? num(pedido?.solicitacao?.quantidadeEmPedido)
                ?? null;
        }
        function quantidadeEntradaPedido(pedido){
            return num(pedido?.entradaEndereco?.quantidadeEntrada)
                ?? num(pedido?.entradaEndereco?.quantidade)
                ?? num(pedido?.pedido?.quantidadeRecebida)
                ?? num(pedido?.ultimoPedido?.quantidadeRecebida)
                ?? null;
        }
        function quantidadePendenteEntrada(pedido){
            return num(pedido?.entradaEndereco?.saldoAEnderecar)
                ?? num(pedido?.recebidoSemEntrada)
                ?? null;
        }
        function solicitantePedido(pedido){
            return primeiroTexto(pedido?.solicitacao?.solicitante, pedido?.solicitacao?.usuario, pedido?.solicitacao?.nome);
        }

            return primeiroTexto(pedido?.solicitacao?.aceitoPor, pedido?.solicitacao?.aprovadoPor, pedido?.solicitacao?.liberadoPor);
        }
        function compradorPedido(pedido){
            return primeiroTexto(
                pedido?.pedido?.comprador,
                pedido?.pedido?.usuario,
                pedido?.pedido?.solicitante,
                pedido?.pedido?.feitoPor,
                pedido?.ultimoPedido?.comprador,

        function origemItem(item){
            return String(item?.limitesOrigem || item?.minimoOrigem || item?.maximoOrigem || item?.reposicaoOrigem || "").toLowerCase();
        }
        function origemTemSuposicao(valor){
            const origem = normalizarTexto(valor);
            return origem === "automatico"
                || origem === "calculada"
                || origem.includes("auto")
                || origem.includes("calcul")
                || origem.includes("estim")
                || origem.includes("sugest");
        }
        function listaDados(valor){
            if(Array.isArray(valor)) return valor;
            if(valor && typeof valor === "object") return Object.values(valor);
            return [];
        }
        function normalizarNomeGuia(valor){
            return String(valor ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }
        async function carregarPlanilhaDownload(nome, guia = ""){
            try{
                if(typeof XLSX === "undefined") return [];
                let response = await fetch(`data/${nome}`, { cache: "no-store" });
                if(!response.ok){
                    response = await fetch(`downloads/${nome}`, { cache: "no-store" });
                }
                if(!response.ok){
                    response = await fetch(nome, { cache: "no-store" });
                }
                if(!response.ok) return [];
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: "array" });
                const guiaNormalizada = normalizarNomeGuia(guia);
                const nomeGuia = guiaNormalizada
                    ? workbook.SheetNames.find(nomeAba => normalizarNomeGuia(nomeAba) === guiaNormalizada)
                        || workbook.SheetNames.find(nomeAba => normalizarNomeGuia(nomeAba).includes(guiaNormalizada) || guiaNormalizada.includes(normalizarNomeGuia(nomeAba)))
                    : "";
                const sheet = workbook.Sheets[nomeGuia || workbook.SheetNames[0]];
                return XLSX.utils.sheet_to_json(sheet, { header: 1 });
            }catch(err){
                console.warn(`Nao foi possivel carregar ${nome}:`, err);
                return [];
            }
        }
        async function carregarMata111(){
            if(mata111Cache) return mata111Cache;
            mata111Cache = await carregarPlanilhaDownload("mata111.xlsx");
            return mata111Cache;
        }
        async function carregarMata110(){
            if(mata110Cache) return mata110Cache;
            mata110Cache = await carregarPlanilhaDownload("mata110.xlsx");
            return mata110Cache;
        }

            if(mata112Cache) return mata112Cache;
            mata112Cache = await carregarPlanilhaDownload("mata112.xlsx", "Saldos a Endereçar");
            return mata112Cache;
        }
        async function carregarHistoricoCooperatLocal(){
            if(historicoCooperatCache) return historicoCooperatCache;
            try{
                const response = await fetch("data/historico_cooperat_antigo.json", { cache: "no-store" });
                if(!response.ok) return null;
                historicoCooperatCache = await response.json();
                return historicoCooperatCache;
            }catch(err){
                console.warn("Nao foi possivel carregar historico_cooperat_antigo.json:", err);
                return null;
            }
        }
        async function carregarEstoqueMinimo(){
            if(estoqueMinimoCache) return estoqueMinimoCache;
            const mapa = new Map();
            estoqueMinimoCache = mapa;
            try{
                if(typeof XLSX === "undefined") return mapa;
                const response = await fetch("downloads/estoque_minimo.xlsx", { cache: "no-store" });
                if(!response.ok) return mapa;
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: "array" });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const linhas = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                linhas.forEach(row => {
                    const codigo = normalizarCodigo(row?.[1]);
                    if(!codigo || codigo.includes("codigo") || codigo.includes("código") || codigo.includes("item")) return;
                    const minimo = normalizarLimiteCooperat(row[6]);
                    const maximo = normalizarLimiteCooperat(row[7]);
                    const reposicaoPlanilha = normalizarLimiteCooperat(row[8]);
                    const saldoAnterior = num(row[5]);
                    const repos = reposicaoPlanilha !== null ? reposicaoPlanilha : calcularReposicaoMedia(minimo, maximo);
                    if(minimo === null && maximo === null && repos === null && saldoAnterior === null) return;
                    mapa.set(codigo, { minimo, maximo, reposicao: repos, saldoAnterior });
                });
            }catch(err){
                console.warn("Nao foi possivel carregar estoque_minimo.xlsx no dashboard:", err);
            }
            return mapa;
        }
        function calcularReposicaoMedia(minimo, maximo){
            const min = limite(minimo);
            const max = limite(maximo);
            if(min === null || max === null || max <= min) return null;
            return max - min;
        }
        function arredondarLimiteEstoque(valor){
            const numero = num(valor);
            if(numero === null || numero <= 0) return null;
            return Math.max(1, Math.ceil(numero));
        }
        function historicoSaldoItemDashboard(item, banco){
            const historico = banco?.historicoSaldo || {};
            const candidatos = [
                key(item),
                item?.protheus,
                item?.protheusKey,
                item?.cooperat
            ].map(normalizarCodigo).filter(Boolean);
            for(const candidato of candidatos){
                const direto = historico[candidato];
                if(Array.isArray(direto)) return direto;
                const codificado = historico[ajusteKey(candidato)];
                if(Array.isArray(codificado)) return codificado;
            }
            return [];
        }
        function estatisticasConsumoDashboard(item, banco){
            const consumos = historicoSaldoItemDashboard(item, banco)
                .filter(h => Number(h?.delta || 0) < 0)
                .slice(-12)
                .map(h => Math.abs(Number(h.delta || 0)))
                .filter(v => Number.isFinite(v) && v > 0);
            if(!consumos.length) return { media:0, pico:0, desvio:0, eventos:0 };
            const media = consumos.reduce((acc, v) => acc + v, 0) / consumos.length;
            const variancia = consumos.reduce((acc, v) => acc + Math.pow(v - media, 2), 0) / consumos.length;
            return { media, pico:Math.max(...consumos), desvio:Math.sqrt(variancia), eventos:consumos.length };
        }
        function calcularSugestaoLimitesDashboard(item, banco, pedidos){
            const pedido = pedidoItem(item, pedidos);
            const consumo = estatisticasConsumoDashboard(item, banco);
            const saldoAtual = num(item?.saldo) ?? 0;
            const saldoAnteriorPlanilha = num(item?.limitesCooperat?.saldoAnterior);
            const consumoEntrePlanilhas = saldoAnteriorPlanilha !== null ? Math.max(0, saldoAnteriorPlanilha - saldoAtual) : 0;
            const mediaPedido = num(pedido?.mediaPedido) ?? 0;
            const ultimoPedidoQuantidade = Math.max(
                num(pedido?.ultimoPedido?.quantidadeRecebida) ?? 0,
                num(pedido?.ultimoPedido?.quantidadePedida) ?? 0
            );
            const basePedidoCompra = mediaPedido > 0 ? mediaPedido : ultimoPedidoQuantidade;
            const minimoPorCompra = basePedidoCompra > 0 ? basePedidoCompra * 0.35 : 0;
            const candidatosConsumo = [
                consumo.media,
                consumo.pico * 0.65,
                consumoEntrePlanilhas
            ].filter(v => Number.isFinite(v) && v > 0);
            const candidatosDemanda = [
                ...candidatosConsumo,
                minimoPorCompra
            ].filter(v => Number.isFinite(v) && v > 0);
            if(!candidatosDemanda.length) return null;
            const demandaBase = Math.max(...candidatosDemanda);
            const estoqueSeguranca = Math.max(

        function incrementarRanking(mapa, usuario, qtd = 1){
            const nome = String(usuario || "").trim() || "Sem usuario";
            const atual = mapa.get(nome) || { usuario:nome, eventos:0, quantidade:0 };
            atual.eventos += 1;
            atual.quantidade += Number(qtd || 0) || 0;
            mapa.set(nome, atual);
        }
        function rankingReposicao(mata110){
            const mapa = new Map();
            (Array.isArray(mata110) ? mata110.slice(2) : []).forEach(row => {
                const solicitante = (row?.[7] ?? "").toString().trim();
                if(!solicitante) return;
                incrementarRanking(mapa, solicitante, 1);
            });
            return [...mapa.values()].sort((a,b) => (b.quantidade - a.quantidade) || (b.eventos - a.eventos));
        }
        function rankingContagens(contagens){
            const mapa = new Map();
            Object.entries(contagens || {}).forEach(([, porUsuario]) => {
                Object.entries(porUsuario || {}).forEach(([usuarioKey, registros]) => {
                    Object.entries(registros || {}).forEach(([registroKey, registro]) => {
                        if(String(registroKey).startsWith("_")) return;
                        const itens = Object.keys(registro?.itens || {}).length;
                        incrementarRanking(mapa, registro?.usuario || usuarioKey, itens);
                    });
                });
            });
            return [...mapa.values()].sort((a,b) => (b.quantidade - a.quantidade) || (b.eventos - a.eventos));
        }
        function calcularProgressoContagem(dados, contagens){
            const totalLinhas = linhasContagemProgresso(dados);
            const contadas = new Set();
            Object.entries(contagens || {}).forEach(([, porUsuario]) => {
                Object.values(porUsuario || {}).forEach(registros => {
                    Object.entries(registros || {}).forEach(([registroKey, registro]) => {
                        if(String(registroKey).startsWith("_")) return;
                        Object.values(registro?.itens || {}).forEach(item => {
                            const codigo = item?.protheus || item?.cooperat || "";
                            const chave = chaveLinhaContagemProgresso(codigo, item?.armazem, item?.endereco);
                            if(totalLinhas.has(chave)) contadas.add(chave);
                        });
                    });
                });
            });
            const total = totalLinhas.size;
            const feitas = contadas.size;
            const percentual = total ? Math.min(100, (feitas / total) * 100) : 0;

        function rankingEtiquetas(etiquetasGeradas, rankingAgregado = {}, contagensCompat = {}){
            const mapa = new Map();
            const visitarRegistroEtiqueta = (registro, usuarioKey = "") => {
                if(!registro || typeof registro !== "object") return;
                if(registro.totalEtiquetas !== undefined || registro.totalCodigosInformados !== undefined){
                    incrementarRanking(mapa, registro.usuario || usuarioKey, registro.totalEtiquetas || registro.totalCodigosInformados || 0);
                    return;
                }
                Object.entries(registro).forEach(([chave, valor]) => visitarRegistroEtiqueta(valor, chave || usuarioKey));
            };
            visitarRegistroEtiqueta(etiquetasGeradas || {});
            Object.entries(contagensCompat || {}).forEach(([, porUsuario]) => {
                Object.entries(porUsuario || {}).forEach(([usuarioKey, registros]) => {
                    if(registros?._etiquetas) visitarRegistroEtiqueta(registros._etiquetas, usuarioKey);
                });
            });
            Object.entries(rankingAgregado || {}).forEach(([usuarioKey, registro]) => {
                if(!registro || typeof registro !== "object") return;
                const nome = registro.usuario || usuarioKey;
                const atual = mapa.get(nome) || { usuario:nome, eventos:0, quantidade:0 };
                atual.eventos = Math.max(Number(atual.eventos || 0), Number(registro.eventos || 0));
                atual.quantidade = Math.max(Number(atual.quantidade || 0), Number(registro.totalEtiquetas || registro.quantidade || 0));
                mapa.set(nome, atual);
            });
            return [...mapa.values()].sort((a,b) => (b.quantidade - a.quantidade) || (b.eventos - a.eventos));
        }

        function eventosHistorico(banco, dados){
            const itemPorChave = new Map();
            dados.forEach(item => {
                [
                    key(item),
                    item?.protheus,
                    item?.protheusKey,
                    item?.cooperat
                ].forEach(codigo => {
                    const normalizado = normalizarCodigo(codigo);
                    if(!normalizado) return;
                    itemPorChave.set(normalizado, item);
                    itemPorChave.set(ajusteKey(normalizado), item);
                });
            });
            const eventos = [];
            Object.entries(banco?.historicoSaldo || {}).forEach(([chave, lista]) => {
                const chaveNormalizada = normalizarCodigo(chave);
                const chaveDecodificada = decodeAjusteKey(chave);
                const item = itemPorChave.get(chave)
                    || itemPorChave.get(chaveNormalizada)
                    || itemPorChave.get(chaveDecodificada)
                    || null;
                if(!item || !(item.protheus || item.cooperat || item.protheusKey)) return;
                (Array.isArray(lista) ? lista : []).forEach(ev => {
                    eventos.push({ ...ev, item, chave, timestamp: Number(ev.timestamp || 0) });
                });
            });
            return eventos;
        }
        function faixaPeriodoAnterior(eventos, periodo = cfg.periodoMovimentacao){
            const timestamps = eventos.map(e => e.timestamp).filter(Boolean);
            const base = timestamps.length ? Math.max(...timestamps) : Date.now();
            const d = new Date(base);
            d.setHours(0,0,0,0);
            const fim = d.getTime();
            const dias = periodo === "mes" ? 30 : periodo === "semana" ? 7 : 1;
            const inicio = fim - (dias * 86400000);
            const inicioLabel = new Date(inicio).toLocaleDateString("pt-BR");
            const fimLabel = new Date(fim - 1).toLocaleDateString("pt-BR");
            const nome = periodo === "mes" ? "mes anterior" : periodo === "semana" ? "semana anterior" : "dia anterior";
            return {
                inicio,
                fim,
                dias,
                periodo,
                nome,
                label: dias === 1 ? inicioLabel : `${inicioLabel} a ${fimLabel}`
            };
        }
        function calcularMovimentacaoPeriodo(banco, dados){
            const eventos = eventosHistorico(banco, dados);
            const faixa = faixaPeriodoAnterior(eventos);
            const lista = eventos.filter(e => e.timestamp >= faixa.inicio && e.timestamp < faixa.fim);
            const zeraram = lista.filter(e => (num(e.saldoAtual) || 0) === 0 && (num(e.saldoAnterior) || 0) > 0);
            const entradas = lista.filter(e => Number(e.delta || 0) > 0);
            const saidas = lista.filter(e => Number(e.delta || 0) < 0);
            return { faixa, lista, zeraram, entradas, saidas };
        }
        function lotesMata185(banco){
            return (Array.isArray(banco?.movimentacoesMata185?.lotes) ? banco.movimentacoesMata185.lotes : [])
                .filter(lote => lote && lote.timestamp)
                .sort((a,b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
        }
        function maquinaEndereco(valor){
            const texto = String(valor ?? "").trim();
            if(!texto || !/[A-Za-z]/.test(texto)) return "";
            return texto.split("/")[0].replace(/\s+/g, " ").trim().toUpperCase();
        }
        function mapaItensPorCodigo(dados){
            const mapa = new Map();
            (Array.isArray(dados) ? dados : []).forEach(item => {
                [item?.protheus, item?.protheusKey, item?.cooperat].forEach(codigo => {
                    const key = normalizarCodigo(codigo);
                    if(key && !mapa.has(key)) mapa.set(key, item);
                });
            });
            return mapa;
        }
        function maquinasItem(item){
            const maquinas = new Set();
            const enderecos = Array.isArray(item?.enderecos) ? item.enderecos : [];
            enderecos.forEach(end => {
                const saldo = num(end?.saldo);
                const maq = maquinaEndereco(end?.endereco);
                if(maq && (saldo === null || saldo > 0)) maquinas.add(maq);
            });
            const principal = maquinaEndereco(item?.enderecoPrincipal || item?.endereco);
            if(principal) maquinas.add(principal);
            return [...maquinas].sort((a,b) => a.localeCompare(b, "pt-BR", { numeric:true, sensitivity:"base" }));
        }
        function enriquecerLinhaMata185(linha, itemPorCodigo){
            const item = itemPorCodigo.get(normalizarCodigo(linha?.codigo));
            const maquinas = Array.isArray(linha?.maquinas) && linha.maquinas.length
                ? linha.maquinas.map(m => String(m).trim().toUpperCase()).filter(Boolean)
                : maquinasItem(item);
            const endereco = item?.enderecoPrincipal || (Array.isArray(item?.enderecos) ? item.enderecos.map(e => e?.endereco).filter(Boolean).join(" | ") : "");
            return {
                ...linha,
                item,
                maquinas,
                maquina: maquinas[0] || "",
                descricao: linha?.descricao || item?.descricao || "",
                unidade: linha?.unidade || item?.unidadeMedida || "",
                endereco,
                saldoAtual: num(item?.saldoAtual ?? item?.saldo) || 0
            };
        }
        function filtrarPorMaquina(lista, maquina){
            if(!maquina) return lista;
            return lista.filter(l => Array.isArray(l.maquinas) && l.maquinas.includes(maquina));
        }
        function calcularMovimentacaoMata185(banco, dados){
            const lotes = lotesMata185(banco);
            const lote = lotes.find(l => String(l.timestamp) === String(cfg.dataMovimentacao)) || lotes[0] || null;
            if(lote && !cfg.dataMovimentacao){
                cfg.dataMovimentacao = String(lote.timestamp);
            }
            const itemPorCodigo = mapaItensPorCodigo(dados);
            const itensEnriquecidos = (Array.isArray(lote?.itens) ? lote.itens : [])
                .map(l => enriquecerLinhaMata185(l, itemPorCodigo));
            const maquinas = [...new Set(itensEnriquecidos.flatMap(l => l.maquinas || []))]
                .sort((a,b) => a.localeCompare(b, "pt-BR", { numeric:true, sensitivity:"base" }));
            if(cfg.maquinaMovimentacao && !maquinas.includes(cfg.maquinaMovimentacao)){
                cfg.maquinaMovimentacao = "";
            }
            const pedidos = banco?.pedidosCompra || {};
            const entradasPendentes = dados
                .map(item => ({ item, pedido: pedidoItem(item, pedidos) }))
                .filter(l => {
                    const status = String(l.pedido?.status || "");
                    return status === "aguardando_enderecamento" || Number(l.pedido?.entradaEndereco?.saldoAEnderecar || 0) > 0;
                })
                .map(l => ({
                    codigo: l.item.protheus || l.item.cooperat || "",
                    descricao: l.item.descricao || "",
                    quantidade: Number(l.pedido?.entradaEndereco?.saldoAEnderecar || l.pedido?.recebidoSemEntrada || 0),
                    detalhe: l.pedido?.detalhe || l.pedido?.titulo || "Entrada pendente",
                    maquinas: maquinasItem(l.item),
                    endereco: l.item.enderecoPrincipal || ""
                }))
                .filter(l => !cfg.maquinaMovimentacao || l.maquinas.includes(cfg.maquinaMovimentacao))
                .sort((a,b) => Number(b.quantidade || 0) - Number(a.quantidade || 0));
            const itens = filtrarPorMaquina(itensEnriquecidos, cfg.maquinaMovimentacao);
            const parciais = filtrarPorMaquina(
                (Array.isArray(lote?.parciais) ? lote.parciais : []).map(l => enriquecerLinhaMata185(l, itemPorCodigo)),
                cfg.maquinaMovimentacao
            );
            return {
                lotes,
                lote,
                maquinas,
                itens,
                parciais,
                entradasPendentes
            };
        }
        function passaStatus(status){
            if(cfg.status === "todos" || cfg.status === "all") return true;
            if(cfg.status === "fora") return status === "abaixo" || status === "acima";
            if(cfg.status === "sem-faixa") return status === "sem";
            return status === cfg.status;
        }

        function baixarCsv(nome, linhas){
            const cabecalhos = Object.keys(linhas[0] || { Aviso:"Sem itens na selecao" });

                ...linhas.map(l => cabecalhos.map(c => `"${String(l[c] ?? "").replace(/"/g, '""')}"`).join(";"))
            ].join("\r\n");
            const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;

        function gerarRelatorioContagemMata185(mov){
            const linhas = (mov?.itens || []).map((l, idx) => ({

                "Descricao": l.descricao || "",
                "Maquina": cfg.maquinaMovimentacao || (l.maquinas || []).join(", "),

                "Endereco atual": l.endereco || "",

                "Contagem": "",
                "Observacao": ""
            }));
            const maquina = (cfg.maquinaMovimentacao || "todas").replace(/[^\w-]+/g, "_").toLowerCase();
            const data = mov?.lote?.timestamp ? new Date(Number(mov.lote.timestamp)).toLocaleDateString("pt-BR").replace(/\D/g, "") : "sem_data";
            const nome = `contagem_mata185_${maquina}_${data}.xlsx`;
            if(typeof XLSX === "undefined"){

            const ws = XLSX.utils.json_to_sheet(linhas.length ? linhas : [{ Aviso:"Sem itens na selecao" }]);

            }).filter(linha => {
                const codigo = key(linha.item);
                if(cfg.itens.length && !cfg.itens.includes(codigo) && !cfg.itens.includes(String(linha.item.cooperat || "").toLowerCase())) return false;
                if(!passaStatus(linha.status)) return false;
                if(cfg.semSolicitacao && pedidoAtivo(linha.pedido)) return false;
                if(cfg.suposicao === "com" && !itemTemSuposicao(linha.item)) return false;
                if(cfg.suposicao === "sem" && itemTemSuposicao(linha.item)) return false;
                if(cfg.origem && linha.origem !== cfg.origem) return false;
                if(cfg.busca){
                    const texto = normalizarTexto([
                        linha.item.protheus,
                        linha.item.cooperat,
                        linha.item.descricao,
                        linha.item.enderecoPrincipal,
                        linha.item.armazemPrincipal,
                        linha.item.armazem,
                        ...armazensItem(linha.item)
                    ].join(" "));
                    if(!texto.includes(normalizarTexto(cfg.busca))) return false;
                }
                return true;
            });

            linhas.sort((a,b) => {
                if(cfg.ordenar === "saldo") return compararValores(num(a.item.saldo) || 0, num(b.item.saldo) || 0, cfg.direcao);
                if(cfg.ordenar === "minimo") return compararValores(num(a.item.minimo) || 0, num(b.item.minimo) || 0, cfg.direcao);
                if(cfg.ordenar === "maximo") return compararValores(num(a.item.maximo) || 0, num(b.item.maximo) || 0, cfg.direcao);
                if(cfg.ordenar === "descricao") return compararValores(a.item.descricao || "", b.item.descricao || "", cfg.direcao);
                if(cfg.ordenar === "codigo") return compararValores(key(a.item), key(b.item), cfg.direcao);
                if(cfg.ordenar === "status") return compararValores(statusRotulo(a.status), statusRotulo(b.status), cfg.direcao);
                if(cfg.ordenar === "pedido") return compararValores(rotuloPedido(a.pedido), rotuloPedido(b.pedido), cfg.direcao);
                if(cfg.ordenar === "origem") return compararValores(a.origem || "", b.origem || "", cfg.direcao);
                return compararValores(a.reposicao || 0, b.reposicao || 0, cfg.direcao);
            });
            const totalFiltrado = linhas.length;
            linhas = linhas.slice(0, Math.min(cfg.limite, linhas.length));

            const abaixo = linhas.filter(l => l.status === "abaixo").length;
            const acima = linhas.filter(l => l.status === "acima").length;
            const semPedido = linhas.filter(l => !pedidoAtivo(l.pedido)).length;
            const totalReposicao = linhas.reduce((s,l) => s + (l.reposicao || 0), 0);

            document.getElementById("subtitulo").textContent = `${linhas.length} de ${totalFiltrado} item(ns) conforme filtros`;
            const dt = banco?.ultimaAtualizacao ? new Date(banco.ultimaAtualizacao).toLocaleString("pt-BR") : "-";
            document.getElementById("ultimaAtualizacao").textContent = `Ultima atualizacao: ${dt}`;
            if(cfg.ambiente === "movimentacao"){
                renderMovimentacao(banco, dadosEscopo, movimentacao, leadTimes, rankings, progressoContagem);
                return;
            }
            if(cfg.ambiente === "avaliador"){
                renderAvaliadorPedidos(banco, dados, mata111, mata112, extras.historicoCooperat || null);
                return;
            }

            root.innerHTML = `
                <section class="cards">
                    <article class="card blue"><span>Itens</span><strong>${linhas.length}</strong></article>
                    <article class="card red"><span>Abaixo do minimo</span><strong>${abaixo}</strong></article>
                    <article class="card green"><span>Acima do maximo</span><strong>${acima}</strong></article>
                    <article class="card"><span>Reposicao total</span><strong>${fmt(totalReposicao)}</strong></article>
                </section>
                ${renderProgressoContagem(progressoContagem)}
                <div class="toolbar">
                    <span class="chip">status=${esc(cfg.status)}</span>
                    <span class="chip">semSolicitacao=${cfg.semSolicitacao ? "1" : "0"}</span>
                    <span class="chip">suposicao=${esc(cfg.suposicao)}</span>
                    <span class="chip">ordenar=${esc(cfg.ordenar)} ${esc(cfg.direcao)}</span>
                    <span class="chip">limite=${cfg.limite}</span>
                    ${cfg.armazens.length ? `<span class="chip">armazem=${esc(cfg.armazens.join(","))}</span>` : ""}
                    <span class="chip">sem solicitacao na lista: ${semPedido}</span>
                    <span class="chip">base carregada: ${dadosEscopo.length}${cfg.armazens.length ? ` de ${dados.length}` : ""}</span>
                    <span class="chip">com estoque minimo: ${dadosEscopo.filter(item => limite(item.minimo) !== null || limite(item.maximo) !== null).length}</span>
                    ${cfg.origem ? `<span class="chip">origem=${esc(cfg.origem)}</span>` : ""}
                    ${cfg.itens.length ? `<span class="chip">itens=${cfg.itens.length}</span>` : ""}
                </div>
                ${renderFiltros(origens, dados.length)}
                <section class="vizGrid">
                    ${renderBarras("Pedidos que mais demoraram ou ainda estao em aberto", leadTimes, "dias")}
                    ${renderPizza(abaixo, acima, Math.max(0, linhas.length - abaixo - acima))}
                </section>
                ${renderRankingsOperacao({...rankings, leadTimes})}
                <h2 class="sectionTitle">Itens em estoque</h2>
                ${linhas.length ? `
                    <div class="tableWrap">
                        <table>
                            <thead>
                                <tr>
                                    ${thOrdenavel("Codigo","estoque","codigo")}
                                    ${thOrdenavel("Descricao","estoque","descricao")}
                                    ${thOrdenavel("Saldo","estoque","saldo","num")}
                                    ${thOrdenavel("Min.","estoque","minimo","num")}
                                    ${thOrdenavel("Max.","estoque","maximo","num")}
                                    ${thOrdenavel("Reposicao","estoque","reposicao","num")}
                                    ${thOrdenavel("Status","estoque","status")}
                                    ${thOrdenavel("Pedido","estoque","pedido")}
                                    ${thOrdenavel("Origem","estoque","origem")}
                                </tr>
                            </thead>
                            <tbody>
                                ${linhas.map(({item,pedido,status,reposicao,origem}) => `
                                    <tr>
                                        <td class="codigo">${esc(item.protheus || item.cooperat || "-")}</td>
                                        <td class="descricao">${esc(item.descricao || "-")}</td>
                                        <td class="num">${fmt(item.saldo)}</td>
                                        <td class="num">${fmt(item.minimo)}</td>
                                        <td class="num">${fmt(item.maximo)}</td>
                                        <td class="num">${fmt(reposicao)}</td>
                                        <td><span class="status ${esc(status)}">${esc(statusRotulo(status))}</span></td>
                                        <td class="pedido ${pedidoAtivo(pedido) ? "" : "semPedido"}">${esc(rotuloPedido(pedido))}</td>
                                        <td class="origem">${esc(origem || "-")}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                ` : `<section class="empty">Nenhum item encontrado com estes parametros.</section>`}
                <h2 class="sectionTitle">Pedidos com maior tempo ate chegada ou ainda em aberto</h2>
                ${renderLeadTimesTabela(leadTimes)}
            `;
            bindFiltros();
        }

        onAuthStateChanged(auth, user => {
            if(!user){
                renderLogin();
                return;
            }
            carregar();
        });
    </script>
</body>
</html>
